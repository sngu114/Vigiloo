name: Quiz Feature CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/quiz/**"
      - "tests/**"
      - "package.json"

  push:
    branches: [main]
    paths:
      - "app/quiz/**"
      - "tests/**"
      - "package.json"

jobs:
  quiz-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test -- quiz